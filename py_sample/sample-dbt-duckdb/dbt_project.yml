name: sample_dbt_duckdb
version: 1.0.0
config-version: 2

profile: sample_dbt_duckdb

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  sample_dbt_duckdb:
    raw:
      +materialized: table
      +schema: raw
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
    metrics:
      +materialized: table
      +schema: metrics
